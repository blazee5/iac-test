apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-api-locust
  namespace: project
data:
  locustfile.py: |
    from locust import HttpUser, between, task


    class EcommerceUser(HttpUser):
        wait_time = between(0.05, 0.2)

        @task(4)
        def list_products(self):
            self.client.get("/products", name="/products")

        @task(2)
        def checkout(self):
            self.client.post(
                "/checkout",
                json={"product_id": "sku-001", "quantity": 1},
                name="/checkout",
            )

        @task(1)
        def health(self):
            self.client.get("/healthz", name="/healthz")
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ecommerce-api-locust
  namespace: project
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ecommerce-api-locust
    spec:
      restartPolicy: Never
      containers:
        - name: locust
          image: locustio/locust:2.32.5
          imagePullPolicy: IfNotPresent
          command:
            - locust
          args:
            - -f
            - /mnt/locust/locustfile.py
            - --headless
            - --users
            - "250"
            - --spawn-rate
            - "25"
            - --run-time
            - 5m
            - --host
            - http://ecommerce-api.project.svc.cluster.local
          volumeMounts:
            - name: locustfile
              mountPath: /mnt/locust
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      volumes:
        - name: locustfile
          configMap:
            name: ecommerce-api-locust

