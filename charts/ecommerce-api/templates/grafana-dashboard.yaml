{{- if and .Values.monitoring.enabled .Values.monitoring.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ecommerce-api.fullname" . }}-dashboard
  labels:
    {{- include "ecommerce-api.labels" . | nindent 4 }}
    grafana_dashboard: "1"
data:
  ecommerce-api-dashboard.json: |
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "links": [],
      "panels": [
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "red", "value": null},
                  {"color": "orange", "value": 0.99},
                  {"color": "green", "value": 0.995}
                ]
              }
            },
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 0, "y": 0},
          "id": 1,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "sum(rate(ecommerce_api_http_requests_total{job=\"{{ include "ecommerce-api.name" . }}\",status!~\"5..\"}[5m])) / sum(rate(ecommerce_api_http_requests_total{job=\"{{ include "ecommerce-api.name" . }}\"}[5m]))",
              "legendFormat": "availability",
              "refId": "A"
            }
          ],
          "title": "Availability SLI",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {
            "defaults": {"unit": "s", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "orange", "value": 0.3}, {"color": "red", "value": 0.5}]}},
            "overrides": []
          },
          "gridPos": {"h": 8, "w": 6, "x": 6, "y": 0},
          "id": 2,
          "options": {"reduceOptions": {"calcs": ["lastNotNull"], "fields": "", "values": false}, "orientation": "auto", "showThresholdLabels": false, "showThresholdMarkers": true},
          "pluginVersion": "11.0.0",
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(ecommerce_api_http_request_duration_seconds_bucket{job=\"{{ include "ecommerce-api.name" . }}\"}[5m])) by (le))",
              "legendFormat": "p95",
              "refId": "A"
            }
          ],
          "title": "Latency SLI p95",
          "type": "gauge"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "reqps"}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 12, "y": 0},
          "id": 3,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [
            {
              "expr": "sum(rate(ecommerce_api_http_requests_total{job=\"{{ include "ecommerce-api.name" . }}\"}[5m])) by (route)",
              "legendFormat": "{{ "{{" }}route{{ "}}" }}",
              "refId": "A"
            }
          ],
          "title": "Request Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 6, "x": 18, "y": 0},
          "id": 4,
          "options": {"legend": {"displayMode": "list", "placement": "bottom"}, "tooltip": {"mode": "single", "sort": "none"}},
          "targets": [
            {
              "expr": "sum(rate(ecommerce_api_http_requests_total{job=\"{{ include "ecommerce-api.name" . }}\",status=~\"5..\"}[5m])) / sum(rate(ecommerce_api_http_requests_total{job=\"{{ include "ecommerce-api.name" . }}\"}[5m]))",
              "legendFormat": "5xx error ratio",
              "refId": "A"
            }
          ],
          "title": "Error Rate",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "id": 5,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {
              "expr": "sum(kube_deployment_status_replicas_available{deployment=\"{{ include "ecommerce-api.fullname" . }}\",namespace=\"$namespace\"})",
              "legendFormat": "available replicas",
              "refId": "A"
            },
            {
              "expr": "sum(kube_deployment_status_replicas{deployment=\"{{ include "ecommerce-api.fullname" . }}\",namespace=\"$namespace\"})",
              "legendFormat": "desired replicas",
              "refId": "B"
            }
          ],
          "title": "Deployment Replicas",
          "type": "timeseries"
        },
        {
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "fieldConfig": {"defaults": {"unit": "percentunit"}, "overrides": []},
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "id": 6,
          "options": {"legend": {"displayMode": "table", "placement": "bottom"}, "tooltip": {"mode": "multi", "sort": "none"}},
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"{{ include "ecommerce-api.fullname" . }}-.*\",container=\"{{ include "ecommerce-api.name" . }}\",namespace=\"$namespace\"}[5m])) / sum(kube_pod_container_resource_requests{pod=~\"{{ include "ecommerce-api.fullname" . }}-.*\",container=\"{{ include "ecommerce-api.name" . }}\",namespace=\"$namespace\",resource=\"cpu\"})",
              "legendFormat": "cpu request utilization",
              "refId": "A"
            }
          ],
          "title": "CPU Utilization",
          "type": "timeseries"
        }
      ],
      "refresh": "10s",
      "schemaVersion": 39,
      "tags": ["sre", "slo", "capstone"],
      "templating": {
        "list": [
          {
            "current": {"selected": false, "text": "{{ .Release.Namespace }}", "value": "{{ .Release.Namespace }}"},
            "hide": 0,
            "label": "Namespace",
            "name": "namespace",
            "query": "label_values(kube_namespace_status_phase, namespace)",
            "refresh": 1,
            "type": "query"
          }
        ]
      },
      "time": {"from": "now-1h", "to": "now"},
      "timezone": "browser",
      "title": "SRE Capstone - Ecommerce API",
      "uid": "project-ecommerce-api",
      "version": 1,
      "weekStart": ""
    }
{{- end }}

